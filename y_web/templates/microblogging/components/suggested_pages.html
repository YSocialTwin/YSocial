<!-- Suggested friends widget -->
<!-- /partials/widgets/suggested-friends-1-widget.html -->
{% if len(spages)>0 %}
<div class="card ys-card-mb ys-suggestion-card">
 <div class="card-heading is-bordered ys-p-1rem ys-suggestion-card__header">
 <div>
 <h4 class="ys-heading-tight">Suggested Pages</h4>
 <p class="ys-suggestion-card__subtitle">Pages aligned with your feed</p>
 </div>
    </div>
    <div class="card-body no-padding">
        <!-- Suggested friend -->
        {% for page in spages %}

 <div class="add-friend-block transition-block ys-suggestion-row">
            <img
                    src="https://via.placeholder.com/300x300"
                    {% if page['profile_pic'] %}
                        data-demo-src="{{ page['profile_pic'] }}"
                    {% else %}
                         data-demo-src="{{ url_for('static', filename='assets/img/users/'+ page['id']|user_image_id +'.png') }}"
                    {% endif %}
                    data-user-popover="9"
                    alt=""
 class="ys-avatar-md ys-suggestion-avatar"
            />
 <div class="page-meta ys-flex-1-mr ys-suggestion-copy">
 <span><a href="/{{exp_id}}/profile/{{ page['id'] }}/recent/1" class="ys-link-dark ys-suggestion-name">{{ page['username']|safe }}</a></span>
 <span class="ys-suggestion-meta">Suggested page</span>
            </div>
            <div class="add-friend add-transition">
 <a href="/{{exp_id}}/follow/{{ page['id'] }}/{{ user_id }}" class="ys-icon-circle-blue"><i data-feather="user-plus"></i></a>
            </div>
        </div>
        {% endfor %}
        <!-- Suggested friend -->

    </div>
</div>
{% endif %}
