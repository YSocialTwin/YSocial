<!-- 
    Reusable Tutorial Base Component
    
    To use this template, include it in your page and define:
    - TUTORIAL_ID: Unique identifier for this tutorial (e.g., 'dashboard', 'agents')
    - TUTORIAL_STEPS: Array of step objects with id, selector, title, description, position
    - TUTORIAL_START_FUNC: Name of the global function to start the tutorial
    
    Example usage in your page-specific tutorial file:
    1. Set TUTORIAL_ID variable: { % set TUTORIAL_ID = 'dashboard' % }
    2. Include this template: { % include 'admin/tutorials/tutorial_base.html' % }
    3. Define your tutorial steps and start function in a script tag
-->

<div id="{{ TUTORIAL_ID }}-tutorial-overlay" class="page-tutorial-overlay" style="display: none;">
    <!-- Backdrop -->
    <div class="tutorial-backdrop" style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 9997;
        pointer-events: none;
    "></div>
    
    <!-- Highlight box -->
    <div class="tutorial-highlight" style="
        position: absolute;
        border: 2px solid #039be5;
        border-radius: 8px;
        box-shadow: 0 0 0 4px rgba(3, 155, 229, 0.15), 0 4px 12px rgba(3, 155, 229, 0.25);
        z-index: 9999;
        pointer-events: none;
        transition: all 0.3s ease-in-out;
        background: transparent;
    "></div>
    
    <!-- Tooltip/Description Box - styled to match admin panel boxes -->
    <div class="tutorial-tooltip" style="
        position: absolute;
        background: #fafafa;
        border: 1px solid #e6e6e6;
        border-left: 4px solid #039be5;
        border-radius: 8px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
        z-index: 10002;
        max-width: 380px;
        min-width: 300px;
        overflow: hidden;
        transition: all 0.3s ease-in-out;
    ">
        <!-- Header -->
        <div class="tutorial-header" style="
            background: linear-gradient(90deg, #039be5 0%, #4facfe 100%);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        ">
            <div>
                <span class="tutorial-step-indicator" style="
                    background: rgba(255, 255, 255, 0.25);
                    color: white;
                    padding: 2px 8px;
                    border-radius: 10px;
                    font-size: 0.7em;
                    font-weight: 600;
                ">Step 1 of X</span>
            </div>
            <button class="tutorial-close" style="
                background: rgba(255, 255, 255, 0.2);
                border: none;
                color: white;
                width: 24px;
                height: 24px;
                border-radius: 50%;
                cursor: pointer;
                font-size: 1.1em;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: background 0.2s;
            " title="Skip Tutorial">&times;</button>
        </div>
        
        <!-- Content -->
        <div class="tutorial-content" style="padding: 16px;">
            <h3 class="tutorial-title" style="
                margin: 0 0 8px 0;
                color: #363636;
                font-size: 1em;
                font-weight: 600;
            "></h3>
            <p class="tutorial-description" style="
                margin: 0;
                color: #666;
                font-size: 0.9em;
                line-height: 1.5;
            "></p>
        </div>
        
        <!-- Footer -->
        <div class="tutorial-footer" style="
            padding: 10px 16px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #e6e6e6;
            background: white;
        ">
            <button class="tutorial-skip" style="
                background: none;
                border: none;
                color: #999;
                font-size: 0.8em;
                cursor: pointer;
                padding: 6px 10px;
                transition: color 0.2s;
            ">Skip</button>
            
            <button class="tutorial-next" style="
                background: linear-gradient(90deg, #039be5 0%, #4facfe 100%);
                border: none;
                color: white;
                padding: 8px 18px;
                border-radius: 4px;
                font-size: 0.85em;
                font-weight: 500;
                cursor: pointer;
                box-shadow: 0 2px 6px rgba(3, 155, 229, 0.3);
                transition: transform 0.2s, box-shadow 0.2s;
            ">Next →</button>
        </div>
    </div>
</div>
<script src="{{ url_for('static', filename='assets/js/tutorial-base.js') }}"></script>
