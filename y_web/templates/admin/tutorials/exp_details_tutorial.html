<!-- Experiment Details Tutorial Overlay -->
<div id="exp-details-tutorial-overlay" style="display: none;">
    <!-- Backdrop with blur - will be clipped to avoid highlighted area -->
    <div id="exp-tutorial-backdrop" style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        z-index: 9997;
        pointer-events: none;
    "></div>
    
    <!-- Highlight box (positioned dynamically) - creates a clear window -->
    <div id="exp-tutorial-highlight" style="
        position: absolute;
        border: 3px solid #039be5;
        border-radius: 12px;
        box-shadow: 0 0 30px rgba(3, 155, 229, 0.8);
        z-index: 10001;
        pointer-events: none;
        transition: all 0.4s ease-in-out;
        background: transparent;
    "></div>
    
    <!-- Clone container for highlighted element - ensures it's visible above backdrop -->
    <div id="exp-tutorial-clone-container" style="
        position: absolute;
        z-index: 9999;
        pointer-events: none;
        overflow: visible;
    "></div>
    
    <!-- Tooltip/Description Box -->
    <div id="exp-tutorial-tooltip" style="
        position: absolute;
        background: white;
        border-radius: 12px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        z-index: 10000;
        max-width: 400px;
        min-width: 320px;
        overflow: hidden;
        transition: all 0.4s ease-in-out;
    ">
        <!-- Header -->
        <div id="exp-tutorial-header" style="
            background: linear-gradient(135deg, #039be5 0%, #00bcd4 100%);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        ">
            <div>
                <span id="exp-tutorial-step-indicator" style="
                    background: rgba(255, 255, 255, 0.2);
                    color: white;
                    padding: 3px 10px;
                    border-radius: 12px;
                    font-size: 0.75em;
                    font-weight: 600;
                ">Step 1 of 7</span>
            </div>
            <button id="exp-tutorial-close" style="
                background: rgba(255, 255, 255, 0.2);
                border: none;
                color: white;
                width: 28px;
                height: 28px;
                border-radius: 50%;
                cursor: pointer;
                font-size: 1.2em;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: background 0.2s;
            " title="Skip Tutorial">&times;</button>
        </div>
        
        <!-- Content -->
        <div id="exp-tutorial-content" style="padding: 20px;">
            <h3 id="exp-tutorial-title" style="
                margin: 0 0 12px 0;
                color: #333;
                font-size: 1.15em;
                font-weight: 600;
            "></h3>
            <p id="exp-tutorial-description" style="
                margin: 0;
                color: #666;
                font-size: 0.92em;
                line-height: 1.6;
            "></p>
        </div>
        
        <!-- Footer -->
        <div id="exp-tutorial-footer" style="
            padding: 12px 20px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #eee;
            background: #fafafa;
        ">
            <button id="exp-tutorial-skip" style="
                background: none;
                border: none;
                color: #999;
                font-size: 0.85em;
                cursor: pointer;
                padding: 6px 12px;
                transition: color 0.2s;
            ">Skip Tutorial</button>
            
            <button id="exp-tutorial-next" style="
                background: linear-gradient(135deg, #039be5 0%, #00bcd4 100%);
                border: none;
                color: white;
                padding: 10px 24px;
                border-radius: 8px;
                font-size: 0.9em;
                font-weight: 500;
                cursor: pointer;
                box-shadow: 0 4px 12px rgba(3, 155, 229, 0.3);
                transition: transform 0.2s, box-shadow 0.2s;
            ">Got it! Next →</button>
        </div>
    </div>
</div>
<script src="{{ url_for('static', filename='assets/js/exp-details-tutorial.js') }}"></script>
