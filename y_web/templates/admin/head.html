            </div>
        </a>
        <a href="/admin/pages" class="dashboard-aside-link sidebar-collapsible" id="sidebar-pages">
            <div>
                <i data-feather="file"></i>

            </div>

        <hr class="sidebar-collapsible">

        {% if current_user_role == "admin" %}
